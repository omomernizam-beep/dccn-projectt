<!DOCTYPE html>
<html>
<head>
    <title>AirChat</title>
    <style>
        body {
            font-family: Arial;
            background: #111827;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        #chatBox {
            width: 80%;
            height: 300px;
            margin: auto;
            background: #1f2937;
            overflow-y: scroll;
            padding: 10px;
            border-radius: 10px;
            text-align: left;
        }

        input {
            padding: 10px;
            width: 60%;
        }

        button {
            padding: 10px;
            background: #22c55e;
            border: none;
            cursor: pointer;
        }

        .msg {
            margin: 5px;
            padding: 8px;
            background: #374151;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>💬 AirChat</h1>

<div id="chatBox"></div>

<br>

<input type="text" id="msgInput" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>

<script>
let messages = [];

function sendMsg() {
    let input = document.getElementById("msgInput");
    let text = input.value;

    if (text === "") return;

    messages.push(text);
    displayMessages();

    input.value = "";
}

function displayMessages() {
    let box = document.getElementById("chatBox");
    box.innerHTML = "";

    messages.forEach(msg => {
        let div = document.createElement("div");
        div.className = "msg";
        div.innerText = msg;
        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
