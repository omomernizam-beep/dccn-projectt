<!DOCTYPE html>
<html>
<head>
    <title>AirChat GitHub</title>
    <style>
        body { font-family: Arial; background:#111; color:white; text-align:center; }
        #chat { height:300px; overflow:auto; background:#222; margin:20px; padding:10px; }
        input { padding:10px; width:60%; }
        button { padding:10px; }
    </style>
</head>
<body>

<h1>💬 AirChat (GitHub)</h1>

<div id="chat"></div>

<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>

<script>
const owner = "YOUR_USERNAME";
const repo = "YOUR_REPO";
const file = "messages.json";
const token = "YOUR_TOKEN";

async function loadMessages() {
    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`);
    const data = await res.json();
    const content = JSON.parse(atob(data.content));

    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    content.forEach(msg => {
        chat.innerHTML += "<p>" + msg + "</p>";
    });
}

async function send() {
    let text = document.getElementById("msg").value;

    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`);
    const data = await res.json();
    let messages = JSON.parse(atob(data.content));

    messages.push(text);

    await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`, {
        method: "PUT",
        headers: {
            "Authorization": "token " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "update chat",
            content: btoa(JSON.stringify(messages)),
            sha: data.sha
        })
    });

    document.getElementById("msg").value = "";
    loadMessages();
}

loadMessages();
setInterval(loadMessages, 3000);
</script>

</body>
</html>
